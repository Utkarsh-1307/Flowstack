name: FlowStack CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: lint + type-check + tests ──────────────────────────────────────
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: analytics_platform_test
          POSTGRES_USER: engine_admin
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U engine_admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt ruff pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check app/

      - name: Type-check (pyright)
        run: pip install pyright && pyright app/ || true

      - name: Tests
        env:
          DATABASE_URL: postgresql+asyncpg://engine_admin:test_password@localhost:5432/analytics_platform_test
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: pytest tests/ -v --tb=short || true

  # ─── Spark: PySpark job lint ──────────────────────────────────────────────────
  spark:
    name: Spark Jobs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spark

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install ruff
      - run: ruff check apps/ core/

  # ─── Airflow: DAG integrity check ─────────────────────────────────────────────
  airflow:
    name: Airflow DAGs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install apache-airflow==2.9.1
      - name: Validate DAG syntax
        run: |
          export AIRFLOW_HOME=$PWD/airflow
          python -c "
          import os, sys
          sys.path.insert(0, 'airflow/plugins')
          from airflow.models import DagBag
          bag = DagBag(dag_folder='airflow/dags', include_examples=False)
          if bag.import_errors:
              for k, v in bag.import_errors.items():
                  print(f'ERROR in {k}: {v}')
              sys.exit(1)
          print(f'OK — {len(bag.dags)} DAGs loaded')
          "

  # ─── Frontend: type-check + build ─────────────────────────────────────────────
  frontend:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  # ─── Docker: build images ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, spark, airflow]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t flowstack-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t flowstack-frontend:${{ github.sha }} ./frontend

      - name: Build spark image
        run: docker build -t flowstack-spark:${{ github.sha }} ./spark

      - name: Build airflow image
        run: docker build -t flowstack-airflow:${{ github.sha }} ./airflow
